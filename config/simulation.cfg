# Grid / domain
nx = 512
ny = 256
lx = 40.0
ly = 20.0

# Time integration
dt = 0.5
t_end = 200
output_every = 4

# Dissipation
nu = 5.0e-3
eta = 5.0e-3

# Initial magnetic profile (double current sheet + psi perturbation)
# init_b0: equilibrium field scale B0
# init_sigma: sheet half-width a
# init_perturbation: perturbation amplitude psi0
init_b0 = 1.0
init_sigma = 2.0
init_perturbation = 0.1

# Helmholtz solver
helmholtz_max_iter = 1200
helmholtz_tol = 1.0e-8

# Output
output_dir = output
