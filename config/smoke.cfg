# Grid / domain
nx = 64
ny = 64
lx = 20.0
ly = 20.0

# Time integration
dt = 0.002
t_end = 0.02
output_every = 2

# Dissipation
nu = 1.0e-3
eta = 1.0e-3

# Initial magnetic profile (double current sheet + psi perturbation)
# init_b0: equilibrium field scale B0
# init_sigma: sheet half-width a
# init_perturbation: perturbation amplitude psi0
init_b0 = 1.0
init_sigma = 2.0
init_perturbation = 0.1

# Helmholtz solver
helmholtz_max_iter = 400
helmholtz_tol = 1.0e-7

# Output
output_dir = output_smoke
